<!-- 통일된 헤더 디자인 (모든 페이지에 적용) -->
<header class="topbar">
  <a class="topbar-brand" href="index.html" title="홈으로 돌아가기">
    <div class="logo-icon">☁</div>
    <div class="brand-info">
      <div class="brand-name">Junseok Lee</div>
      <div class="brand-role">Enterprise Platform Engineer</div>
    </div>
  </a>
  
  <nav class="topbar-nav">
    <a class="tnav" href="index.html" id="nav-home">Home</a>
    <a class="tnav" href="projects.html" id="nav-projects">Projects</a>
    <a class="tnav" href="technology-map.html" id="nav-techmap">Technology Map</a>
    <a class="tnav" href="architecture-library.html" id="nav-arch">Architecture Library</a>
  </nav>
  
  <div class="topbar-right">
    <button class="theme-toggle" id="theme-toggle" title="라이트/다크 모드 전환" aria-label="Toggle light/dark mode">
      <svg class="sun-icon" fill="currentColor" viewBox="0 0 24 24" style="display:none;">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6m-16.78 7.78l4.24-4.24m5.08-5.08l4.24-4.24"/>
      </svg>
      <svg class="moon-icon" fill="currentColor" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<script>
// 라이트/다크 모드 전환 로직
(function() {
  const html = document.documentElement;
  const theme = localStorage.getItem('theme') || 'dark';
  const toggle = document.getElementById('theme-toggle');
  const sunIcon = toggle?.querySelector('.sun-icon');
  const moonIcon = toggle?.querySelector('.moon-icon');
  
  function setTheme(t) {
    if (t === 'light') {
      html.classList.add('light-mode');
      localStorage.setItem('theme', 'light');
      if (sunIcon && moonIcon) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
    } else {
      html.classList.remove('light-mode');
      localStorage.setItem('theme', 'dark');
      if (sunIcon && moonIcon) {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    }
  }
  
  setTheme(theme);
  toggle?.addEventListener('click', () => {
    const current = localStorage.getItem('theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
  });
  
  // 현재 페이지 네비게이션 활성화
  const path = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.topbar-nav .tnav').forEach(link => {
    if (link.getAttribute('href') === path) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });
})();
</script>
